<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryzenn Nutrition</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
        }

        .container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container img {
  max-width: 90%;
  max-height: 80vh;
  width: auto;
  height: auto;
}

        .overlay {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: white;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="logo.svg" alt="Ryzenn Nutrition Logo" />

        <div class="overlay">
            Coming Soon 🚀
        </div>
    </div>

</body>

</html>
